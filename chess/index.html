  <!-- ===== 下拉菜单 ===== -->
  <div class="dropdown-menu" id="settingsMenu">
    <button class="dropdown-item" id="themeToggle">
      <i class="fas fa-sun" id="themeIcon"></i>
    </button>
    <div class="dropdown-divider"></div>
    <button class="dropdown-item" id="cookieSettingsBtn">
      <i class="fas fa-cookie-bite"></i>
    </button>
  </div>

  <!-- ===== Cookie 弹窗 ===== -->
  <div class="cookie-banner" id="cookieBanner">
    <div class="cookie-inner">
      <div class="cookie-text">
        <strong>Cookies:</strong><br> 我们使用 Cookies 以为你提供个性化体验或广告服务(当然我肯定不会搞广告)
      </div>
      <div class="cookie-buttons">
        <button class="cookie-btn primary" data-choice="all">接受所有 Cookies</button>
        <button class="cookie-btn" data-choice="necessary">仅接受必要 Cookies</button>
        <button class="cookie-btn reject" data-choice="none">不接受 Cookies</button>
      </div>
    </div>
  </div>

  <script>
    var COOKIE_MAX_AGE = 36500;

    function setCookie(name, value) {
      var expires = new Date(Date.now() + COOKIE_MAX_AGE * 864e5).toUTCString();
      document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + expires + '; path=/; SameSite=Lax';
    }

    function getCookie(name) {
      var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? decodeURIComponent(match[2]) : null;
    }

    function clearAllCookies() {
      document.cookie.split(';').forEach(function(c) {
        var name = c.split('=')[0].trim();
        document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
      });
    }

    var banner = document.getElementById('cookieBanner');
    var settingsBtn = document.getElementById('settingsBtn');
    var settingsMenu = document.getElementById('settingsMenu');
    var themeToggle = document.getElementById('themeToggle');
    var themeIcon = document.getElementById('themeIcon');
    var cookieSettingsBtn = document.getElementById('cookieSettingsBtn');
    var mask = document.getElementById('rippleMask');
    var body = document.body;
    var isProcessing = false;
    var activeCard = null;
    var consent = getCookie('cookie_consent');
    var menuOpen = false;

    function updateMenuPosition() {
      var rect = settingsBtn.getBoundingClientRect();
      settingsMenu.style.top = (rect.bottom + 8) + 'px';
      settingsMenu.style.left = (rect.right - settingsMenu.offsetWidth) + 'px';
    }

    settingsBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      menuOpen = !menuOpen;
      if (menuOpen) {
        updateMenuPosition();
        settingsMenu.classList.add('open');
      } else {
        settingsMenu.classList.remove('open');
      }
    });

    document.addEventListener('click', function() {
      if (menuOpen) {
        menuOpen = false;
        settingsMenu.classList.remove('open');
      }
    });

    window.addEventListener('resize', function() {
      if (menuOpen) updateMenuPosition();
    });

    window.addEventListener('scroll', function() {
      if (menuOpen) updateMenuPosition();
    });

    function applyTheme(theme) {
      if (theme === 'light') {
        body.classList.add('light');
        themeIcon.className = 'fas fa-moon';
      } else {
        body.classList.remove('light');
        themeIcon.className = 'fas fa-sun';
      }
    }

    function toggleTheme() {
      if (!getCookie('cookie_consent')) return;
      if (isProcessing) return;

      var rect = settingsBtn.getBoundingClientRect();
      var x = rect.left + rect.width / 2;
      var y = rect.top + rect.height / 2;

      var isLight = body.classList.contains('light');
      var rippleColor = isLight ? 'dark-ripple' : 'light-ripple';

      var circle = document.createElement('div');
      circle.classList.add('ripple-circle', rippleColor);
      var size = Math.max(window.innerWidth, window.innerHeight) * 2.5;
      circle.style.width = size + 'px';
      circle.style.height = size + 'px';
      circle.style.left = (x - size / 2) + 'px';
      circle.style.top = (y - size / 2) + 'px';
      mask.appendChild(circle);

      setTimeout(function() {
        var newTheme = isLight ? 'dark' : 'light';
        applyTheme(newTheme);
        if (getCookie('cookie_consent') === 'all') {
          setCookie('theme', newTheme);
        }
      }, 150);

      setTimeout(function() { circle.remove(); }, 2100);
    }

    if (consent) {
      banner.classList.add('hidden');
      var savedTheme = getCookie('theme');
      if (savedTheme === 'light') {
        applyTheme('light');
      } else {
        applyTheme('dark');
      }
    } else {
      applyTheme('dark');
    }

    themeToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      if (!getCookie('cookie_consent')) return;
      toggleTheme();
      menuOpen = false;
      settingsMenu.classList.remove('open');
    });

    cookieSettingsBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      showCookieBanner();
      menuOpen = false;
      settingsMenu.classList.remove('open');
    });

    document.querySelectorAll('[data-card]').forEach(function(card) {
      var light = card.querySelector('.light');
      card.addEventListener('mouseenter', function() { light.classList.add('show'); activeCard = card; });
      card.addEventListener('mousemove', function(e) {
        if (activeCard !== card) return;
        var rect = card.getBoundingClientRect();
        var x = ((e.clientX - rect.left) / rect.width) * 100;
        var y = ((e.clientY - rect.top) / rect.height) * 100;
        light.style.setProperty('--x', x + '%');
        light.style.setProperty('--y', y + '%');
      });
      card.addEventListener('mouseleave', function() {
        if (activeCard === card) { light.classList.remove('show'); activeCard = null; }
      });
    });

    function showCookieBanner() {
      banner.classList.remove('hidden', 'fade-out');
      banner.style.display = '';
      document.querySelectorAll('.cookie-btn').forEach(function(b) { b.disabled = false; });
      isProcessing = false;
    }

    document.querySelectorAll('.cookie-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        if (isProcessing) return;
        var choice = this.dataset.choice;
        var allBtns = document.querySelectorAll('.cookie-btn');
        allBtns.forEach(function(b) { b.disabled = true; });
        isProcessing = true;
        banner.classList.add('fade-out');
        setTimeout(function() {
          clearAllCookies();
          if (choice === 'all') {
            setCookie('cookie_consent', 'all');
            var isLight = body.classList.contains('light');
            setCookie('theme', isLight ? 'light' : 'dark');
          } else if (choice === 'necessary') {
            setCookie('cookie_consent', 'necessary');
            applyTheme('dark');
          } else {
            setCookie('cookie_consent', 'none');
            applyTheme('dark');
          }
          banner.classList.add('hidden');
          isProcessing = false;
          allBtns.forEach(function(b) { b.disabled = false; });
        }, 700);
      });
    });
  </script>
</body>
