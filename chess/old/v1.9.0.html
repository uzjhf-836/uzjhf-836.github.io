        };

        let selectedCharacter = { id: 3, name: 'AI：3 (强力)', desc: '等级三的AI。战术意识显著增强。' };
        const CHARACTERS = [
            { id: 1, name: 'AI：1', desc: '等级一的AI。反应迅速，适合新手练手。' },
            { id: 2, name: 'AI：2', desc: '等级二的AI。开始有策略性思考。' },
            { id: 3, name: 'AI：3 (强力)', desc: '等级三的AI。战术意识显著增强。' },
            { id: 4, name: 'AI：4 (满算力)', desc: '等级四的AI。满算力，具备深度计算能力。' }
        ];
        let customBoard = null;
        let customStartColor = COLORS.WHITE;
        let selectedPickerPiece = null;

        // ---------- 渲染 ----------
        function render() {
            const size = canvas.width;
            const cellSize = size / 8;
            if (!game.state) return;
            const board = game.state.board;
            for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
                const isLight = (r + c) % 2 === 0;
                ctx.fillStyle = isLight ? settings.lightSquare : settings.darkSquare;
                ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
            }

            if (!game.animating) {
                if (game.lastMove) {
                    ctx.fillStyle = hexToRgba(settings.moveHighlight, 0.5);
                    ctx.fillRect(game.lastMove.fromCol * cellSize, game.lastMove.fromRow * cellSize, cellSize, cellSize);
                    ctx.fillRect(game.lastMove.toCol * cellSize, game.lastMove.toRow * cellSize, cellSize, cellSize);
                }
                if (game.premove && game.turn === game.aiColor) {
                    ctx.fillStyle = hexToRgba(settings.premoveHighlight, 0.5);
                    ctx.fillRect(game.premove.toCol * cellSize, game.premove.toRow * cellSize, cellSize, cellSize);
                }
            }

            if (game.selected) {
                for (const m of game.legalMoves) {
                    const tr = m.toRow, tc = m.toCol;
                    const target = board[tr][tc];
                    ctx.beginPath();
                    if (target) {
                        ctx.arc(tc * cellSize + cellSize / 2, tr * cellSize + cellSize / 2, cellSize * 0.38, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(255, 0, 0, 0.35)';
                        ctx.fill();
                    } else {
                        ctx.arc(tc * cellSize + cellSize / 2, tr * cellSize + cellSize / 2, cellSize * 0.16, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
                        ctx.fill();
                    }
                }
            }

            for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
                const p = board[r][c];
                if (!p) continue;
                const unicode = PIECE_UNICODE[p.color][p.type];
                ctx.font = `${cellSize * 0.78}px 'Segoe UI', 'Arial Unicode MS', 'Noto Sans', sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 8;
                ctx.fillStyle = p.color === COLORS.WHITE ? settings.whitePiece : settings.blackPiece;
                ctx.fillText(unicode, c * cellSize + cellSize / 2, r * cellSize + cellSize / 2 + 2);
                ctx.shadowBlur = 0;
                ctx.strokeStyle = p.color === COLORS.WHITE ? '#b0a090' : '#404040';
                ctx.lineWidth = 0.5;
                ctx.strokeText(unicode, c * cellSize + cellSize / 2, r * cellSize + cellSize / 2 + 2);
            }

            if (game.gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.45)';
                ctx.fillRect(0, 0, size, size);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 20;
                let mainMsg = '', subMsg = '', mainColor = '#f0e6d3';
                if (game.winner === 'player') { mainMsg = '🎉 你胜利了！'; mainColor = '#ffd700'; subMsg = game.endReason || ''; }
                else if (game.winner === 'ai') { mainMsg = '💀 你输了！'; mainColor = '#ff6b6b'; subMsg = game.endReason || ''; }
                else if (game.winner === 'draw') { mainMsg = '🤝 平局'; subMsg = game.endReason || ''; }
                ctx.font = 'bold 46px sans-serif';
                ctx.fillStyle = mainColor;
                ctx.fillText(mainMsg, size / 2, size / 2 - 25);
                ctx.font = 'bold 26px sans-serif';
                ctx.fillStyle = '#f0e6d3';
                ctx.fillText(subMsg, size / 2, size / 2 + 45);
                ctx.shadowBlur = 0;
            }
            updateCapturedDisplay();
        }

        function hexToRgba(hex, opacity) {
            let r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
            return `rgba(${r}, ${g}, ${b}, ${opacity})`;
        }

        function updateCapturedDisplay() {
            const whiteCaptured = game.captured.white || [];
            const blackCaptured = game.captured.black || [];
            let aiHtml = '', aiScore = 0;
            blackCaptured.forEach(p => { aiHtml += `<span>${getUnicode(p)}</span>`; aiScore += PIECE_VALUES[p.type] || 0; });
            aiCapturedPieces.innerHTML = aiHtml;
            let playerHtml = '', playerScore = 0;
            whiteCaptured.forEach(p => { playerHtml += `<span>${getUnicode(p)}</span>`; playerScore += PIECE_VALUES[p.type] || 0; });
            playerCapturedPieces.innerHTML = playerHtml;
            const diff = playerScore - aiScore;
            if (diff > 0) { aiCapturedScore.textContent = ''; playerCapturedScore.textContent = `+${diff}`; playerCapturedScore.className = 'score positive'; }
            else if (diff < 0) { aiCapturedScore.textContent = `${diff}`; aiCapturedScore.className = 'score positive'; playerCapturedScore.textContent = ''; }
            else { aiCapturedScore.textContent = ''; playerCapturedScore.textContent = ''; }
        }

        // ---------- 计时器（修复：初始化保护） ----------
        let clockInterval = null;
        let turnStartTimestamp = 0;
        let blinkToggle = true;

        function stopClock() { if (clockInterval) { clearInterval(clockInterval); clockInterval = null; } }

        function startClock() {
            stopClock();
            if (game.gameOver) return;
            turnStartTimestamp = Date.now();
            clockInterval = setInterval(() => {
                updateClockDisplay();
                if (game.whiteTime <= 0 || game.blackTime <= 0) {
                    setGameOverByTime();
                    render();
                    updateClockDisplay();
                }
            }, 50);
        }

        // 关键修复：如果 timestamp 为 0（尚未开始），不扣任何时间
        function updateClockDisplay() {
            if (turnStartTimestamp === 0) {
                // 刚初始化，还没开始计时，直接显示初始值
                playerTimeDisplay.textContent = formatTime(game.whiteTime, game.totalWhiteTime);
                aiTimeDisplay.textContent = formatTime(game.blackTime, game.totalBlackTime);
                return;
            }

            const elapsed = Date.now() - turnStartTimestamp;
            let pTime = game.whiteTime;
            let aTime = game.blackTime;
            if (game.turn === COLORS.WHITE) {
                pTime = Math.max(0, game.whiteTime - elapsed);
            } else {
                aTime = Math.max(0, game.blackTime - elapsed);
            }
            playerTimeDisplay.textContent = formatTime(pTime, game.totalWhiteTime);
            aiTimeDisplay.textContent = formatTime(aTime, game.totalBlackTime);

            const isPLow = pTime < 10000 && pTime > 0;
            const isALow = aTime < 10000 && aTime > 0;
            playerTimeDisplay.classList.toggle('low-time', isPLow);
            aiTimeDisplay.classList.toggle('low-time', isALow);
            if (isPLow) playerTimeDisplay.classList.toggle('blink', !blinkToggle);
            else playerTimeDisplay.classList.remove('blink');
            if (isALow) aiTimeDisplay.classList.toggle('blink', !blinkToggle);
            else aiTimeDisplay.classList.remove('blink');

            const updateProgress = (time, element, total) => {
                if (total === 'inf' || total === 0) { element.style.display = 'none'; return; }
                if (time > 10000) { element.style.display = 'none'; }
                else { element.style.display = 'block'; const progress = Math.max(0, time / 10000); element.style.width = (progress * 100) + '%'; const g = Math.round(255 * progress); const b = Math.round(255 * progress); element.style.background = `rgb(255, ${g}, ${b})`; }
            };
            updateProgress(pTime, playerProgress, game.totalWhiteTime);
            updateProgress(aTime, aiProgress, game.totalBlackTime);

            if (pTime <= 0) { game.whiteTime = 0; setGameOverByTime(); }
            else if (aTime <= 0) { game.blackTime = 0; setGameOverByTime(); }
        }

        function setGameOverByTime() {
            if (game.gameOver) return;
            stopClock();
            game.gameOver = true;
            if (game.whiteTime <= 0) { game.winner = 'ai'; game.endReason = '玩家时间耗尽'; }
            else if (game.blackTime <= 0) { game.winner = 'player'; game.endReason = 'AI时间耗尽'; }
        }

        function formatTime(ms, totalMs) {
            if (totalMs === Infinity || totalMs === 0 || totalMs === 'inf') return '∞';
            const seconds = Math.floor(ms / 1000);
            if (ms < 10000) {
                const centiseconds = Math.floor((ms % 1000) / 10);
                return `${String(seconds).padStart(2, '0')}.${String(centiseconds).padStart(2, '0')}`;
            } else {
                const minutes = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }
        }

        setInterval(() => { blinkToggle = !blinkToggle; if (!game.gameOver) updateClockDisplay(); }, 500);
        setInterval(() => {
            const wrapper = boardWrapper;
            wrapper.style.boxShadow = 'none';
            if (game.gameOver) {
                if (game.winner === 'player') wrapper.style.boxShadow = `inset 0 0 40px 20px ${hexToRgba(settings.glowWin, 0.8)}, 0 0 20px ${hexToRgba(settings.glowWin, 0.3)}`;
                else if (game.winner === 'ai') wrapper.style.boxShadow = `inset 0 0 40px 20px ${hexToRgba(settings.glowLose, 0.8)}, 0 0 20px ${hexToRgba(settings.glowLose, 0.3)}`;
            } else if (game.state && game.turn === game.playerColor && isInCheck(game.state, game.playerColor)) {
                wrapper.style.boxShadow = `inset 0 0 40px 20px ${hexToRgba(settings.glowLose, 0.8)}, 0 0 20px ${hexToRgba(settings.glowLose, 0.3)}`;
            }
        }, 300);

        // ---------- 走棋执行 ----------
        function executeMoveWithAnimation(move, callback) {
            const state = game.state;
            const board = state.board;
            const piece = board[move.fromRow][move.fromCol];
            const captured = board[move.toRow][move.toCol];

            if (game.turn === game.aiColor) {
                const isCapture = captured && captured.color !== game.aiColor;
                const simState = makeMoveState(state, move);
                const isCheck = simState && isInCheck(simState, game.playerColor);
                const chatText = getAIChatText(state.board, move, isCapture, isCheck);
                showChatBubble(chatText);
            }

            if (move.castle || move.ep || (piece && piece.type === PIECES.PAWN && (move.toRow === 0 || move.toRow === 7))) {
                if (game.turn === game.playerColor && piece && piece.type === PIECES.PAWN && (move.toRow === 0 || move.toRow === 7)) {
                    game.pendingMove = move;
                    game.pendingCallback = callback;
                    showPromotionDialog(piece.color);
                    return;
                }
                doExecuteMove(move);
                if (callback) callback();
                return;
            }

            const size = canvas.width;
            const cellSize = size / 8;
            const scaleX = overlay.offsetWidth / size;
            const scaleY = overlay.offsetHeight / size;
            const startX = move.fromCol * cellSize * scaleX;
            const startY = move.fromRow * cellSize * scaleY;
            const dx = (move.toCol - move.fromCol) * cellSize * scaleX;
            const dy = (move.toRow - move.fromRow) * cellSize * scaleY;
            const fontSize = cellSize * 0.78;

            const pieceEl = document.createElement('div');
            pieceEl.className = 'anim-piece';
            pieceEl.style.width = (cellSize * scaleX) + 'px';
            pieceEl.style.height = (cellSize * scaleY) + 'px';
            pieceEl.style.display = 'flex';
            pieceEl.style.alignItems = 'center';
            pieceEl.style.justifyContent = 'center';
            pieceEl.style.fontSize = (fontSize * scaleX) + 'px';
            pieceEl.style.left = startX + 'px';
            pieceEl.style.top = startY + 'px';
            pieceEl.textContent = getUnicode(piece);
            pieceEl.style.color = piece.color === COLORS.WHITE ? settings.whitePiece : settings.blackPiece;
            overlay.appendChild(pieceEl);

            let capturedEl = null;
            if (captured) {
                capturedEl = document.createElement('div');
                capturedEl.className = 'anim-piece captured';
                capturedEl.style.width = (cellSize * scaleX) + 'px';
                capturedEl.style.height = (cellSize * scaleY) + 'px';
                capturedEl.style.display = 'flex';
                capturedEl.style.alignItems = 'center';
                capturedEl.style.justifyContent = 'center';
                capturedEl.style.fontSize = (fontSize * scaleX) + 'px';
                capturedEl.style.left = (move.toCol * cellSize * scaleX) + 'px';
                capturedEl.style.top = (move.toRow * cellSize * scaleY) + 'px';
                capturedEl.textContent = getUnicode(captured);
                capturedEl.style.color = captured.color === COLORS.WHITE ? settings.whitePiece : settings.blackPiece;
                capturedEl.style.opacity = '1';
                overlay.appendChild(capturedEl);
            }
            void pieceEl.offsetHeight;
            if (capturedEl) void capturedEl.offsetHeight;
            pieceEl.style.transform = `translate(${dx}px, ${dy}px)`;
            if (capturedEl) capturedEl.style.opacity = '0';

            setTimeout(() => {
                if (pieceEl.parentNode) pieceEl.remove();
                if (capturedEl && capturedEl.parentNode) capturedEl.remove();
                doExecuteMove(move);
                if (callback) callback();
            }, 250);
        }

        function showPromotionDialog(color) {
            const overlay = document.getElementById('promotion-overlay');
            overlay.classList.add('active');
            const options = overlay.querySelectorAll('.promo-opt');
            options.forEach(el => {
                const type = el.dataset.type;
                el.textContent = PIECE_UNICODE[color][type];
                el.onclick = () => {
                    overlay.classList.remove('active');
                    const move = game.pendingMove;
                    const cb = game.pendingCallback;
                    game.pendingMove = null;
                    game.pendingCallback = null;
                    move.promotion = type;
                    doExecuteMove(move);
                    if (cb) cb();
                };
            });
        }

        function doExecuteMove(move) {
            stopClock();

            const elapsed = Date.now() - turnStartTimestamp;
            let deduct;
            if (game.isPremoveExecution) {
                deduct = Math.max(200, elapsed);
            } else {
                deduct = Math.max(500, elapsed);
            }

            if (game.turn === COLORS.WHITE) game.whiteTime = Math.max(0, game.whiteTime - deduct);
            else game.blackTime = Math.max(0, game.blackTime - deduct);

            if (game.whiteTime <= 0 || game.blackTime <= 0) {
                setGameOverByTime();
                render();
                updateClockDisplay();
                return;
            }

            const state = game.state;
            const board = state.board;
            const color = game.turn;
            const enemy = color === COLORS.WHITE ? COLORS.BLACK : COLORS.WHITE;
            const piece = board[move.fromRow][move.fromCol];
            if (!piece) return;

            const capturedPiece = board[move.toRow][move.toCol];
            if (capturedPiece) {
                game.captured[color].push(capturedPiece);
            }

            const newState = makeMoveState(state, move);
            if (!newState) return;
            game.state = newState;
            game.moveHistory.push(move);
            game.lastMove = { fromRow: move.fromRow, fromCol: move.fromCol, toRow: move.toRow, toCol: move.toCol };
            game.turn = enemy;
            game.moveCount++;
            game.selected = null;
            game.legalMoves = [];

            const fen = getFen();
            if (!game.repetitionCount[fen]) game.repetitionCount[fen] = 0;
            game.repetitionCount[fen]++;
            if (game.repetitionCount[fen] >= 3) {
                game.gameOver = true;
                game.winner = 'draw';
                game.endReason = '三次重复局面';
                render();
                updateClockDisplay();
                return;
            }

            if (checkGameOverByMoves()) {
                render();
                updateClockDisplay();
                return;
            }
            render();

            if (game.turn === game.playerColor && game.premove && !game.isExecutingPremove) {
                const pm = game.premove;
                game.premove = null;
                const pMoves = getAllLegalMoves(game.state, game.playerColor, game.lastMove);
                const isValid = pMoves.some(m => m.fromRow === pm.fromRow && m.fromCol === pm.fromCol && m.toRow === pm.toRow && m.toCol === pm.toCol);
                if (isValid) {
                    game.isExecutingPremove = true;
                    game.isPremoveExecution = true;
                    doExecuteMove(pm);
                    game.isPremoveExecution = false;
                    game.isExecutingPremove = false;
                    return;
                }
            }

            startClock();
            updateClockDisplay();

            if (game.turn === game.aiColor && !game.gameOver && !game.isAIThinking) {
                game.isAIThinking = true;
                setTimeout(() => {
                    try {
                        let bookMoveStr = null;
                        if (game.moveCount < 16) { bookMoveStr = getBookMove(game.moveHistory); }

                        if (bookMoveStr) {
                            const uciObj = uciToColRow(bookMoveStr);
                            if (uciObj) {
                                const moves = getAllLegalMoves(game.state, game.aiColor, game.lastMove);
                                const foundMove = moves.find(m => m.fromCol === uciObj.fromCol && m.fromRow === uciObj.fromRow && m.toCol === uciObj.toCol && m.toRow === uciObj.toRow);
                                if (foundMove) {
                                    game.isAIThinking = false;
                                    game.animating = true;
                                    executeMoveWithAnimation(foundMove, () => { game.animating = false; });
                                    return;
                                }
                            }
                        }

                        const move = getAIMove(game.state, game.aiColor, game.lastMove, game.aiDifficulty);
                        game.isAIThinking = false;

                        if (game.gameOver) return;
                        if (!move) {
                            if (checkGameOverByMoves()) { render(); updateClockDisplay(); }
                            return;
                        }

                        const targetMinTime = 1000;
                        const delayMs = Math.max(0, targetMinTime - 0);

                        setTimeout(() => {
                            if (game.gameOver) return;
                            game.animating = true;
                            executeMoveWithAnimation(move, () => { game.animating = false; });
                        }, delayMs);
                    } catch (e) {
                        console.error("AI计算异常", e);
                        game.isAIThinking = false;
                        game.animating = false;
                    }
                }, 0);
            }
        }

        function checkGameOverByMoves() {
            const moves = getAllLegalMoves(game.state, game.turn, game.lastMove);
            if (moves.length === 0) {
                game.gameOver = true;
                if (isInCheck(game.state, game.turn)) {
                    if (game.turn === COLORS.WHITE) { game.winner = 'ai'; game.endReason = '玩家被将死'; }
                    else { game.winner = 'player'; game.endReason = 'AI被将死'; }
                } else { game.winner = 'draw'; game.endReason = '逼和'; }
                return true;
            }
            return false;
        }

        function getFen() {
            let fen = '';
            const charMap = { 'king':'k', 'queen':'q', 'rook':'r', 'bishop':'b', 'knight':'n', 'pawn':'p' };
            const board = game.state.board;
            for (let r = 0; r < 8; r++) {
                let empty = 0;
                for (let c = 0; c < 8; c++) {
                    const p = board[r][c];
                    if (!p) { empty++; }
                    else {
                        if (empty > 0) { fen += empty; empty = 0; }
                        let ch = charMap[p.type];
                        fen += p.color === COLORS.WHITE ? ch.toUpperCase() : ch;
                    }
                }
                if (empty > 0) fen += empty;
                if (r < 7) fen += '/';
            }
            fen += ' ' + (game.turn === COLORS.WHITE ? 'w' : 'b');
            let castling = '';
            if (!game.state.kingMoved.black) {
                if (!game.state.rookMoved.blackK) castling += 'k';
                if (!game.state.rookMoved.blackQ) castling += 'q';
            }
            if (!game.state.kingMoved.white) {
                if (!game.state.rookMoved.whiteK) castling += 'K';
                if (!game.state.rookMoved.whiteQ) castling += 'Q';
            }
            fen += ' ' + (castling || '-');
            fen += ' -';
            return fen;
        }

        // ---------- 点击处理 ----------
        function handleCanvasClick(e) {
            if (game.isAIThinking || game.gameOver || game.animating) return;

            if (e.button === 2) {
                game.premove = null;
                game.selected = null;
                game.legalMoves = [];
                render();
                return;
            }

            if (game.turn === game.playerColor) {
                if (game.premove) game.premove = null;
            }

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            const col = Math.floor(x / (canvas.width / 8));
            const row = Math.floor(y / (canvas.height / 8));
            if (!inBounds(row, col)) return;
            const board = game.state.board;
            const piece = board[row][col];

            if (game.turn === game.aiColor) {
                if (game.selected) {
                    const targetMove = game.legalMoves.find(m => m.toRow === row && m.toCol === col);
                    if (targetMove) {
                        game.premove = targetMove;
                        game.selected = null;
                        game.legalMoves = [];
                        render();
                        return;
                    }
                    if (piece && piece.color === game.playerColor) {
                        game.selected = { row, col };
                        game.legalMoves = generateLegalMoves(game.state, row, col, game.lastMove);
                        render();
                        return;
                    }
                    game.selected = null;
                    game.legalMoves = [];
                    render();
                    return;
                }
                if (piece && piece.color === game.playerColor) {
                    const moves = generateLegalMoves(game.state, row, col, game.lastMove);
                    if (moves.length > 0) { game.selected = { row, col }; game.legalMoves = moves; render(); }
                }
                return;
            }

            if (game.turn !== game.playerColor) return;
            if (game.selected) {
                const targetMove = game.legalMoves.find(m => m.toRow === row && m.toCol === col);
                if (targetMove) {
                    hideChatBubble();
                    game.animating = true;
                    stopClock();
                    executeMoveWithAnimation(targetMove, () => { game.animating = false; });
                    return;
                }
                if (piece && piece.color === game.turn) {
                    game.selected = { row, col };
                    game.legalMoves = generateLegalMoves(game.state, row, col, game.lastMove);
                    render();
                    return;
                }
                game.selected = null;
                game.legalMoves = [];
                render();
                return;
            }
            if (piece && piece.color === game.turn) {
                const moves = generateLegalMoves(game.state, row, col, game.lastMove);
                if (moves.length > 0) { game.selected = { row, col }; game.legalMoves = moves; render(); }
            }
        }

        // ---------- 聊天气泡 ----------
        function getAIChatText(board, move, isCapture, isCheck) {
            const openingQuotes = ["开局还是要稳扎稳打。", "准备迎接战斗！", "让我想想布局...", "嘿嘿，这局有得下了。"];
            const checkQuotes = ["将军！想好怎么解了吗？", "攻守转换，小心了！", "尝尝我的攻势吧！"];
            const captureQuotes = ["嘿嘿，你的子归我了！", "这一步收获不错。", "吃！", "赚了赚了。"];
            const endgameQuotes = ["进入残局了，别放松！", "残局是我的舞台。", "王也要上前线了。"];
            const generalQuotes = ["让我认真想想...", "有意思，你下得挺果断。", "陷阱设好了，来踩吧！", "局势焦灼啊。", "这步棋有点意思...", "看你能不能识破我的计划。"];

            if (isCapture) return captureQuotes[Math.floor(Math.random() * captureQuotes.length)];
            if (isCheck) return checkQuotes[Math.floor(Math.random() * checkQuotes.length)];
            let pieceCount = 0;
            if (board) { for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) if (board[r][c]) pieceCount++; }
            if (pieceCount <= 12) return endgameQuotes[Math.floor(Math.random() * endgameQuotes.length)];
            if (game.moveCount < 8) return openingQuotes[Math.floor(Math.random() * openingQuotes.length)];
            return generalQuotes[Math.floor(Math.random() * generalQuotes.length)];
        }

        function showChatBubble(text) {
            try { aiChatText.textContent = text; aiChatBubble.classList.add('show'); } catch(e) { console.warn("显示气泡失败:", e); }
        }
        function hideChatBubble() { try { aiChatBubble.classList.remove('show'); } catch(e) {} }

        // ---------- 初始化游戏 ----------
        function initGame(timeSetting, difficulty, customBoardArray, turn) {
            let state;
            if (customBoardArray) {
                state = {
                    board: customBoardArray.map(row => row.map(cell => cell ? { ...cell } : null)),
                    kingMoved: { white: true, black: true },
                    rookMoved: { whiteK: true, whiteQ: true, blackK: true, blackQ: true }
                };
            } else {
                state = createInitialBoardState();
            }
            game.state = state;
            game.turn = turn || COLORS.WHITE;
            game.selected = null;
            game.legalMoves = [];
            game.gameOver = false;
            game.isAIThinking = false;
            game.moveCount = 0;
            game.lastMove = null;
            game.animating = false;
            overlay.innerHTML = '';
            game.moveHistory = [];
            game.playerColor = COLORS.WHITE;
            game.aiColor = COLORS.BLACK;
            game.aiDifficulty = difficulty;
            game.winner = null;
            game.endReason = null;
            game.repetitionCount = {};
            game.premove = null;
            game.isExecutingPremove = false;
            game.isPremoveExecution = false;
            game.pendingMove = null;
            game.pendingCallback = null;
            game.captured = { white: [], black: [] };
            hideChatBubble();
            if (timeSetting === 'inf') {
                game.totalWhiteTime = game.totalBlackTime = 'inf';
                game.whiteTime = game.blackTime = Infinity;
            } else {
                const ms = parseInt(timeSetting) * 1000;
                game.totalWhiteTime = game.totalBlackTime = ms;
                game.whiteTime = game.blackTime = ms;
            }

            // 关键：先调用 startClock 设置 timestamp，再更新显示
            stopClock();
            startClock();  // 这会设置 turnStartTimestamp = Date.now()
            updateClockDisplay();
            render();
        }

        // ---------- 自定义棋盘 ----------
        function initCustomBoard() {
            const b = [];
            for (let r = 0; r < 8; r++) { b[r] = []; for (let c = 0; c < 8; c++) b[r][c] = null; }
            customBoard = b;
            selectedPickerPiece = null;
            customStartColor = COLORS.WHITE;
            renderCustomBoard();
            document.querySelectorAll('.picker-opt').forEach(el => el.classList.remove('active'));
            document.querySelector('#custom-board-overlay .custom-opt[data-start="white"]')?.classList.add('active');
        }

        function renderCustomBoard() {
            if (!customBoard) return;
            const cCanvas = document.getElementById('customCanvas');
            const cCtx = cCanvas.getContext('2d');
            const size = cCanvas.width; const cellSize = size / 8;
            for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
                const isLight = (r + c) % 2 === 0;
                cCtx.fillStyle = isLight ? settings.lightSquare : settings.darkSquare;
                cCtx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
            }
            for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
                const p = customBoard[r][c];
                if (!p) continue;
                const unicode = PIECE_UNICODE[p.color][p.type];
                cCtx.font = `${cellSize * 0.78}px 'Segoe UI', 'Arial Unicode MS', 'Noto Sans', sans-serif`;
                cCtx.textAlign = 'center'; cCtx.textBaseline = 'middle';
                cCtx.shadowColor = 'rgba(0,0,0,0.3)'; cCtx.shadowBlur = 8;
                cCtx.fillStyle = p.color === COLORS.WHITE ? settings.whitePiece : settings.blackPiece;
                cCtx.fillText(unicode, c * cellSize + cellSize / 2, r * cellSize + cellSize / 2 + 2);
                cCtx.shadowBlur = 0;
                cCtx.strokeStyle = p.color === COLORS.WHITE ? '#b0a090' : '#404040';
                cCtx.lineWidth = 0.5;
                cCtx.strokeText(unicode, c * cellSize + cellSize / 2, r * cellSize + cellSize / 2 + 2);
            }
        }

        function handleCustomCanvasClick(e) {
            const cCanvas = document.getElementById('customCanvas');
            const rect = cCanvas.getBoundingClientRect();
            const scaleX = cCanvas.width / rect.width; const scaleY = cCanvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX; const y = (e.clientY - rect.top) * scaleY;
            const col = Math.floor(x / (cCanvas.width / 8)); const row = Math.floor(y / (cCanvas.height / 8));
            if (!inBounds(row, col)) return;
            if (selectedPickerPiece) {
                customBoard[row][col] = { color: selectedPickerPiece.color, type: selectedPickerPiece.type };
            } else {
                customBoard[row][col] = null;
            }
            renderCustomBoard();
        }

        function startCustomGame() {
            const timeVal = document.getElementById('custom-time-select').value;
            const charVal = parseInt(document.getElementById('custom-char-select').value);
            const startEl = document.querySelector('#custom-board-overlay .custom-opt.active');
            const startColor = startEl ? startEl.dataset.start : 'white';
            const turn = startColor === 'black' ? COLORS.BLACK : COLORS.WHITE;

            document.getElementById('custom-board-overlay').classList.remove('active');
            document.getElementById('menu-page').classList.remove('active');
            document.getElementById('game-page').classList.add('active');

            const boardCopy = customBoard.map(row => row.map(cell => cell ? { ...cell } : null));
            initGame(timeVal, charVal, boardCopy, turn);
        }

        // ---------- 角色选择 ----------
        function initCharacterSelection() {
            selectedCharNameSpan.textContent = selectedCharacter.name;
        }

        function renderCharacterList() {
            const list = document.getElementById('character-list');
            list.innerHTML = '';
            CHARACTERS.forEach(char => {
                const el = document.createElement('div');
                el.className = 'opt';
                el.textContent = char.name;
                if (char.id === selectedCharacter.id) el.classList.add('selected');
                el.onclick = () => {
                    selectedCharacter = char;
                    document.getElementById('char-home-title').textContent = char.name;
                    document.getElementById('char-home-desc').textContent = char.desc;
                    list.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
                    el.classList.add('selected');
                };
                list.appendChild(el);
            });
        }

        // ---------- 事件绑定 ----------
        document.getElementById('btn-play').addEventListener('click', () => {
            document.getElementById('setup-overlay').classList.add('active');
        });
        document.getElementById('btn-custom-game').addEventListener('click', () => {
            document.getElementById('custom-board-overlay').classList.add('active');
            initCustomBoard();
        });
        document.getElementById('btn-settings-menu').addEventListener('click', () => {
            document.getElementById('settings-overlay').classList.add('active');
            document.getElementById('t-light').value = settings.lightSquare;
            document.getElementById('t-dark').value = settings.darkSquare;
            document.getElementById('t-white').value = settings.whitePiece;
            document.getElementById('t-black').value = settings.blackPiece;
            document.getElementById('t-glow-lose').value = settings.glowLose;
            document.getElementById('t-glow-win').value = settings.glowWin;
            document.getElementById('t-hl-move').value = settings.moveHighlight;
            document.getElementById('t-hl-premove').value = settings.premoveHighlight;
        });
        document.getElementById('btn-back').addEventListener('click', () => {
            stopClock();
            document.getElementById('game-page').classList.remove('active');
            document.getElementById('menu-page').classList.add('active');
        });
        document.getElementById('btn-apply-settings').addEventListener('click', () => {
            updateSettingsFromUI();
            document.getElementById('settings-overlay').classList.remove('active');
        });

        document.getElementById('customCanvas').addEventListener('click', handleCustomCanvasClick);
        document.getElementById('btn-clear-board').addEventListener('click', initCustomBoard);
        document.getElementById('btn-start-custom-game').addEventListener('click', startCustomGame);

        document.querySelectorAll('#piece-picker .picker-opt').forEach(el => {
            el.addEventListener('click', function() {
                const parent = this.parentElement;
                parent.querySelectorAll('.picker-opt').forEach(o => o.classList.remove('active'));
                this.classList.add('active');
                const pieceStr = this.dataset.piece;
                if (pieceStr === 'none') {
                    selectedPickerPiece = null;
                } else {
                    const color = pieceStr.startsWith('w') ? COLORS.WHITE : COLORS.BLACK;
                    const typeMap = { 'K': PIECES.KING, 'Q': PIECES.QUEEN, 'R': PIECES.ROOK, 'B': PIECES.BISHOP, 'N': PIECES.KNIGHT, 'P': PIECES.PAWN };
                    selectedPickerPiece = { color: color, type: typeMap[pieceStr[1]] };
                }
                renderCustomBoard();
            });
        });

        document.querySelectorAll('#custom-board-overlay .custom-opt').forEach(el => {
            el.addEventListener('click', function() {
                const parent = this.parentElement;
                parent.querySelectorAll('.custom-opt').forEach(o => o.classList.remove('active'));
                this.classList.add('active');
            });
        });

        document.getElementById('btn-choose-character').addEventListener('click', () => {
            document.getElementById('character-overlay').classList.add('active');
            renderCharacterList();
            document.getElementById('char-home-title').textContent = selectedCharacter.name;
            document.getElementById('char-home-desc').textContent = selectedCharacter.desc;
        });
        document.getElementById('btn-confirm-character').addEventListener('click', () => {
            document.getElementById('character-overlay').classList.remove('active');
            selectedCharNameSpan.textContent = selectedCharacter.name;
            game.aiDifficulty = selectedCharacter.id;
        });

        bindTextInput('c-light', 't-light');
        bindTextInput('c-dark', 't-dark');
        bindTextInput('c-white', 't-white');
        bindTextInput('c-black', 't-black');
        bindTextInput('c-glow-lose', 't-glow-lose');
        bindTextInput('c-glow-win', 't-glow-win');
        bindTextInput('c-hl-move', 't-hl-move');
        bindTextInput('c-hl-premove', 't-hl-premove');

        document.querySelectorAll('#theme-options .opt').forEach(el => {
            el.addEventListener('click', function() {
                const parent = this.parentElement;
                parent.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                setTheme(this.dataset.theme);
            });
        });
        document.querySelectorAll('#time-options .opt').forEach(el => {
            el.addEventListener('click', function() {
                const parent = this.parentElement;
                parent.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
        initCharacterSelection();

        document.getElementById('btn-start-game').addEventListener('click', () => {
            const timeEl = document.querySelector('#time-options .opt.selected');
            const timeVal = timeEl ? timeEl.dataset.val : '600';
            document.getElementById('setup-overlay').classList.remove('active');
            document.getElementById('menu-page').classList.remove('active');
            document.getElementById('game-page').classList.add('active');
            initGame(timeVal, selectedCharacter.id, null, COLORS.WHITE);
        });

        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('contextmenu', (e) => { e.preventDefault(); handleCanvasClick({ button: 2, clientX: e.clientX, clientY: e.clientY }); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const touch = e.touches[0]; handleCanvasClick({ clientX: touch.clientX, clientY: touch.clientY }); }, { passive: false });
        document.addEventListener('keydown', (e) => {
            if ((e.key === 'r' || e.key === 'R') && document.getElementById('game-page').classList.contains('active')) {
                stopClock();
                initGame(game.totalWhiteTime === 'inf' ? 'inf' : game.totalWhiteTime/1000, game.aiDifficulty, null, game.turn);
            }
        });

        console.log("✅ 国际象棋引擎启动成功！开局时间显示已修复。");
    </script>
</body>
</html>
